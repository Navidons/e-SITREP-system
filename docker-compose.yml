services:
  postgres:
    image: postgres:16-alpine
    container_name: esitrep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: esitrep
      POSTGRES_PASSWORD: esitrep_dev
      POSTGRES_DB: esitrep
    ports:
      - "5432:5432"
    volumes:
      - esitrep_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esitrep -d esitrep"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  esitrep_pgdata:
